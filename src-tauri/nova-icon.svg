<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient: Deep space indigo/purple -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1c072e" />
      <stop offset="70%" stop-color="#0a0314" />
      <stop offset="100%" stop-color="#030008" />
    </radialGradient>
    <!-- Play Button/Supernova Glow Gradient: Neon Rose to Gold -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3366" />
      <stop offset="50%" stop-color="#ff5e3a" />
      <stop offset="100%" stop-color="#ffa834" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Smooth Dark Canvas -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Outer Cosmic Aura (supernova rings) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#logoGrad)" stroke-width="6" opacity="0.15" filter="url(#glow)" />
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" opacity="0.25" />
  
  <!-- Glowing Star Flare Background -->
  <path d="M256 90 L268 220 L398 232 L268 244 L256 374 L244 244 L114 232 L244 220 Z" fill="url(#logoGrad)" opacity="0.08" filter="url(#glow)" />

  <!-- Main Rounded Play Triangle Container -->
  <g transform="translate(196, 176)" filter="url(#glow)">
    <path d="M 0,20 C 0,5.7 15.6,-3.1 27.8,4.1 L 138.2,74.1 C 150.1,81.0 150.1,99.0 138.2,105.9 L 27.8,175.9 C 15.6,183.1 0,174.3 0,160 Z" fill="url(#logoGrad)" />
  </g>
</svg>
